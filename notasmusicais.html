<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎼 Fiamme Realistiche</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: transparent;
    }

    .fire {
        position: absolute;
        font-size: 2.5rem;
        pointer-events: none;
        animation: fall linear infinite, sway ease-in-out infinite alternate;
        filter: drop-shadow(0 0 10px rgba(255,140,0,0.8))
                drop-shadow(0 0 20px rgba(255,69,0,0.6))
                drop-shadow(0 0 30px rgba(255,0,0,0.4));
    }

    @keyframes fall {
        0% {
            transform: translateY(-10vh) rotate(0deg) scale(1);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        100% {
            transform: translateY(110vh) rotate(180deg) scale(1.2);
            opacity: 0.8;
        }
    }

    @keyframes sway {
        0% {
            margin-left: -20px;
        }
        100% {
            margin-left: 20px;
        }
    }
</style>
</head>
<body>

<script>
    const numberOfFires = 30;

    for (let i = 0; i < numberOfFires; i++) {
        const fire = document.createElement("div");
        fire.classList.add("fire");
        fire.innerHTML = "🎼";

        fire.style.left = Math.random() * 100 + "vw";

        const duration = 4 + Math.random() * 6;
        fire.style.animationDuration = duration + "s, " + (2 + Math.random() * 3) + "s";

        fire.style.animationDelay = Math.random() * 5 + "s";

        fire.style.fontSize = (1.5 + Math.random() * 2.5) + "rem";

        document.body.appendChild(fire);
    }
</script>

</body>
</html>
